name: Build Kivy APK

on:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Python & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-pip python3-setuptools git openjdk-11-jdk unzip
          pip install --upgrade pip
          pip install cython==0.29.36 kivy==2.3.1 buildozer

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simplekivyapp-apk
          path: bin/*.apk
