name: Build Kivy App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          wget

    - name: Install Android SDK
      run: |
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools-linux-9477386_latest.zip
        mkdir -p $HOME/android/cmdline-tools
        mv cmdline-tools $HOME/android/cmdline-tools/latest
        echo "$HOME/android/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/android" >> $GITHUB_ENV

        # Explicitly install the problematic RC package, ignore errors
        $HOME/android/cmdline-tools/latest/bin/sdkmanager "build-tools;37-rc2" || true

        # Accept RC package license safely
        echo "y" | $HOME/android/cmdline-tools/latest/bin/sdkmanager --licenses || true

        # Install other required SDK packages
        $HOME/android/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"

        # Accept all remaining licenses automatically
        yes | $HOME/android/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Cache buildozer directory
      uses: actions/cache@v3
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build with buildozer
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: counter-app-apk
        path: bin/*.apk